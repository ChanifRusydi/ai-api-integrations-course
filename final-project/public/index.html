<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>QuackBot - Rubber Duck Debugger</title>
    <style>
      :root {
        --bg: #0f172a;
        --panel: #111827;
        --panel-2: #0b1220;
        --border: #1f2937;
        --user: #2563eb;
        --bot: #334155;
        --text: #e2e8f0;
        --muted: #94a3b8;
        --accent: #facc15;
        --danger: #b91c1c;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
        background: var(--bg);
        color: var(--text);
        min-height: 100vh;
        padding: 16px;
      }

      .app {
        width: min(1080px, 100%);
        margin: 0 auto;
        min-height: calc(100vh - 32px);
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 16px;
        overflow: hidden;
        display: grid;
        grid-template-columns: 280px 1fr;
      }

      .sidebar {
        background: var(--panel-2);
        border-right: 1px solid var(--border);
        display: flex;
        flex-direction: column;
        min-height: 0;
      }

      .sidebar-header {
        padding: 16px;
        border-bottom: 1px solid var(--border);
      }

      .sidebar-header h2 {
        margin: 0 0 6px;
        font-size: 1rem;
      }

      .sidebar-header p {
        margin: 0;
        color: var(--muted);
        font-size: 0.88rem;
      }

      .session-list {
        padding: 12px;
        display: flex;
        flex-direction: column;
        gap: 8px;
        overflow-y: auto;
      }

      .session-item {
        width: 100%;
        text-align: left;
        background: #111827;
        color: var(--text);
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 12px;
      }

      .session-item.active {
        border-color: #64748b;
        background: #172033;
      }

      .session-title {
        display: block;
        font-size: 0.95rem;
        font-weight: 700;
        margin-bottom: 6px;
      }

      .session-preview {
        display: block;
        color: var(--muted);
        font-size: 0.84rem;
        line-height: 1.35;
      }

      .session-empty {
        color: var(--muted);
        font-size: 0.9rem;
        padding: 8px;
      }

      .main {
        display: flex;
        flex-direction: column;
        min-width: 0;
      }

      .header {
        padding: 14px 18px;
        border-bottom: 1px solid var(--border);
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
      }

      .header h1 {
        font-size: 1rem;
        margin: 0;
      }

      .header p {
        margin: 4px 0 0;
        color: var(--muted);
        font-size: 0.9rem;
      }

      .header-copy {
        min-width: 0;
      }

      .header-actions {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
        justify-content: flex-end;
      }

      #chat {
        flex: 1;
        min-height: 420px;
        overflow-y: auto;
        padding: 14px;
        display: flex;
        flex-direction: column;
        gap: 10px;
      }

      .welcome {
        margin: auto;
        width: min(680px, 100%);
        text-align: center;
        padding: 24px;
      }

      .welcome h2 {
        margin: 0 0 10px;
        font-size: 1.8rem;
      }

      .welcome p {
        margin: 0 auto 18px;
        color: var(--muted);
        line-height: 1.5;
        max-width: 54ch;
      }

      .welcome-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
        gap: 12px;
      }

      .welcome-card {
        text-align: left;
        background: var(--panel-2);
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 14px;
      }

      .welcome-card strong {
        display: block;
        margin-bottom: 6px;
      }

      .welcome-card span {
        color: var(--muted);
        font-size: 0.9rem;
        line-height: 1.4;
      }

      .msg {
        max-width: 85%;
        padding: 10px 12px;
        border-radius: 10px;
      }

      .msg-body {
        line-height: 1.35;
        white-space: pre-wrap;
        word-wrap: break-word;
      }

      .msg-time {
        display: block;
        margin-top: 6px;
        font-size: 0.75rem;
        opacity: 0.75;
      }

      .msg.user {
        background: var(--user);
        margin-left: auto;
      }

      .msg.bot {
        background: var(--bot);
        margin-right: auto;
      }

      form {
        display: flex;
        gap: 8px;
        border-top: 1px solid var(--border);
        padding: 12px;
      }

      input {
        flex: 1;
        padding: 10px;
        border-radius: 10px;
        border: 1px solid #374151;
        background: var(--panel-2);
        color: var(--text);
        font-size: 1rem;
      }

      button {
        border: 0;
        border-radius: 10px;
        padding: 10px 14px;
        cursor: pointer;
        font-weight: 600;
        background: var(--accent);
        color: #111827;
      }

      #new-chat-btn,
      #clear-btn {
        background: #475569;
        color: var(--text);
      }

      #delete-chat-btn {
        background: var(--danger);
        color: #fff;
      }

      button:disabled {
        opacity: 0.6;
        cursor: not-allowed;
      }

      @media (max-width: 840px) {
        body {
          padding: 10px;
        }

        .app {
          grid-template-columns: 1fr;
          min-height: calc(100vh - 20px);
        }

        .sidebar {
          max-height: 220px;
          border-right: 0;
          border-bottom: 1px solid var(--border);
        }

        .header,
        form {
          padding: 10px;
        }

        .header {
          flex-direction: column;
          align-items: stretch;
        }

        .header-actions {
          justify-content: stretch;
        }

        .header-actions button {
          flex: 1;
        }

        form {
          flex-wrap: wrap;
        }

        input {
          width: 100%;
          min-width: 100%;
        }

        #clear-btn,
        #send-btn {
          flex: 1;
        }

        #chat {
          min-height: 360px;
          padding: 10px;
        }

        .msg {
          max-width: 92%;
        }

        .welcome {
          padding: 12px;
        }

        .welcome h2 {
          font-size: 1.5rem;
        }
      }
    </style>
  </head>
  <body>
    <main class="app">
      <aside class="sidebar">
        <div class="sidebar-header">
          <h2>Saved chats</h2>
          <p>Switch between stored conversations</p>
        </div>
        <div id="session-list" class="session-list" aria-live="polite"></div>
      </aside>

      <section class="main">
        <header class="header">
          <div class="header-copy">
            <h1>🦆 QuackBot</h1>
            <p>Your concise rubber duck debugger</p>
          </div>
          <div class="header-actions">
            <button id="new-chat-btn" type="button">New chat</button>
            <button id="delete-chat-btn" type="button">Delete chat</button>
          </div>
        </header>

        <section id="chat" aria-live="polite"></section>

        <form id="chat-form">
          <input
            id="message-input"
            type="text"
            placeholder="Describe your bug..."
            autocomplete="off"
            required
          />
          <button id="clear-btn" type="button">Clear messages</button>
          <button id="send-btn" type="submit">Send</button>
        </form>
      </section>
    </main>

    <script src="./script.js"></script>
  </body>
</html>
